<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cruciverba - Binario 9 e 3/4</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-bg"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="logo-container">
        <a href="/"><img src="/images/logo_light.png" alt="Binario 9 e 3/4"></a>
      </div>
    </header>

    <nav class="main-nav">
      <button class="nav-toggle">&#9776;</button>
      <ul class="nav-list">
        <li><a href="/">Home Page</a></li>
        <li><a href="/crucipuzzle">Crucipuzzle</a></li>
        <li><a href="/cruciverba" class="active">Cruciverba</a></li>
        <li><a href="/quiz">Mini Quiz</a></li>
        <li><a href="/cappello">Test Cappello Parlante</a></li>
        <li><a href="/classifiche">Classifiche</a></li>
        <li><a href="/login" id="auth-link">Login/Registrati</a></li>
      </ul>
    </nav>

    <main class="content-area">
      <h1 class="page-title">Cruciverba Magico</h1>

      <div class="crossword-container">
        <div style="text-align:center; margin-bottom:10px; font-family:Cinzel,serif; font-size:1.1rem; color:#2a1a0a;">
          <span id="crossword-timer">00:00</span>
        </div>
        <div class="crossword-grid" id="crossword-grid"></div>
        <div style="text-align:center; margin:15px 0; display:flex; gap:10px; justify-content:center;">
          <button class="btn btn-primary" id="check-btn">Verifica</button>
          <button class="btn btn-secondary" id="new-btn">Nuovo Cruciverba</button>
        </div>
      </div>

      <div class="clues-container">
        <div class="clues-section">
          <h3>Orizzontali</h3>
          <div id="clues-across"></div>
        </div>
        <div class="clues-section">
          <h3>Verticali</h3>
          <div id="clues-down"></div>
        </div>
      </div>

      <div class="result-overlay" id="result-overlay">
        <div class="result-modal">
          <h2>Cruciverba Completato!</h2>
          <div class="final-score" id="final-score">0</div>
          <div class="final-time" id="final-time">Tempo: 00:00</div>
          <div class="result-actions">
            <button class="btn btn-primary" onclick="location.reload()">Gioca Ancora</button>
            <a href="/classifiche" class="btn btn-secondary">Classifiche</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="social-links">
        <a href="#">f</a>
        <a href="#">𝕏</a>
        <a href="#">IG</a>
        <a href="#">♪</a>
      </div>
      <p>&copy; 2024 Binario 9 e 3/4</p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/cruciverba.js"></script>
</body>
</html>
