        </div>

        <!-- Per-game scores -->
        <div class="profile-section">
          <h2 style="font-family:Cinzel,serif; color:#4a2c10; font-size:1.3rem; margin-bottom:20px; text-align:center;">Punteggi per Gioco</h2>
