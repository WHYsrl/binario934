<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Cappello Parlante - Binario 9 e 3/4</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page-bg"></div>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="logo-container">
        <a href="/"><img src="/images/logo_light.png" alt="Binario 9 e 3/4"></a>
      </div>
    </header>

    <nav class="main-nav">
      <button class="nav-toggle">&#9776;</button>
      <ul class="nav-list">
        <li><a href="/">Home Page</a></li>
        <li><a href="/crucipuzzle">Crucipuzzle</a></li>
        <li><a href="/cruciverba">Cruciverba</a></li>
        <li><a href="/quiz">Mini Quiz</a></li>
        <li><a href="/cappello" class="active">Test Cappello Parlante</a></li>
        <li><a href="/classifiche">Classifiche</a></li>
        <li><a href="/login" id="auth-link">Login/Registrati</a></li>
      </ul>
    </nav>

    <main class="content-area">
      <h1 class="page-title">Test del Cappello Parlante</h1>

      <div class="sorting-container">
        <div class="hat-image">
          <img src="/images/_0000_cappello.png" alt="Cappello Parlante">
        </div>

        <div class="hat-speech" id="hat-speech">
          "Ah, un nuovo studente! Siediti, siediti... lascia che guardi nella tua mente..."
        </div>

        <div class="quiz-progress" style="margin-bottom:20px;">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <span id="question-num"></span>
        </div>

        <div class="sorting-options" id="sorting-options">
          <button class="btn btn-primary" id="start-sorting">Inizia lo Smistamento</button>
        </div>

        <div class="house-result" id="house-result">
          <div class="house-crest"></div>
          <h2 class="house-name"></h2>
          <p class="house-desc"></p>
          <div class="result-actions" style="margin-top:20px;">
            <button class="btn btn-primary" id="save-house-btn" style="display:none;">Salva la tua Casa</button>
            <button class="btn btn-secondary" id="retry-btn">Rifai il Test</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="social-links">
        <a href="#">f</a>
        <a href="#">𝕏</a>
        <a href="#">IG</a>
        <a href="#">♪</a>
      </div>
      <p>&copy; 2024 Binario 9 e 3/4</p>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/cappello.js"></script>
</body>
</html>
